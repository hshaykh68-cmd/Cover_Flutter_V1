# Codemagic CI/CD Configuration for Cover App
# Android Debug Build Pipeline

workflows:
  debug-workflow:
    name: Cover Android Debug Build
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      # Step 1: Install Flutter dependencies
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      
      # Step 2: Generate code FIRST (creates .g.dart files needed for analysis)
      - name: Generate code
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs
      
      # Step 3: Analyze code AFTER generated files exist
      - name: Analyze code
        script: |
          flutter analyze --no-fatal-infos || true
      
      # Step 4: Build Android Debug APK
      - name: Build Android Debug APK
        script: |
          flutter build apk --debug
    
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk