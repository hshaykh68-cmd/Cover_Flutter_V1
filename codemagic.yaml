# Codemagic CI/CD Configuration for Cover App
# Android Debug Build Pipeline

workflows:
  debug-workflow:
    name: Cover Android Debug Build
    environment:
      flutter: 3.19.6
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      # Step 1: Install Flutter dependencies
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      
      # Step 2: Generate Gradle wrapper using Gradle itself
      - name: Setup Gradle
        script: |
          cd android
          
          # Download gradle-wrapper.jar
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar
          
          # Create properties file
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          
          # Generate gradlew using java
          java -jar gradle/wrapper/gradle-wrapper.jar wrapper --gradle-version 8.0.2 2>/dev/null || true
          
          chmod +x gradlew 2>/dev/null || true
          cd ..
      
      # Step 3: Generate code
      - name: Generate code
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs
      
      # Step 4: Build Android Debug APK
      - name: Build Android Debug APK
        script: |
          flutter build apk --debug
    
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk