# Codemagic CI/CD Configuration for Cover App
# Android Debug Build Pipeline

workflows:
  debug-workflow:
    name: Cover Android Debug Build
    environment:
      flutter: 3.19.6
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      # Step 1: Install Flutter dependencies
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      
      # Step 2: Setup Gradle with Gradle 8.0
      - name: Setup Gradle
        script: |
          mkdir -p android/gradle/wrapper
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.0/gradle/wrapper/gradle-wrapper.jar
          
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-all.zip
          EOF
          
          chmod +x android/gradlew
      
      # Step 3: Generate code
      - name: Generate code
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs
      
      # Step 4: Build Android Debug APK
      - name: Build Android Debug APK
        script: |
          flutter build apk --debug
    
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk