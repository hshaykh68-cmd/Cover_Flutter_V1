# Codemagic CI/CD Configuration for Cover App
# Android Debug Build Pipeline

workflows:
  debug-workflow:
    name: Cover Android Debug Build
    environment:
      flutter: 3.19.6
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      
      - name: Generate Drift code FIRST
        script: |
          # Clean any previous generated files
          flutter pub run build_runner clean
          # Generate Drift database code
          flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Verify generated files exist
        script: |
          # Check if Drift generated the database files
          if [ -f "lib/data/local/database/app_database.g.dart" ]; then
            echo "✅ Drift files generated successfully"
          else
            echo "❌ Drift generation failed"
            exit 1
          fi
      
      - name: Patch sqflite_sqlcipher plugin
        script: |
          PLUGIN_DIR=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 1 -name "sqflite_sqlcipher-*" | head -1)
          
          if [ -d "$PLUGIN_DIR" ]; then
            PLUGIN_PATH="$PLUGIN_DIR/android/build.gradle"
            echo "Found plugin at: $PLUGIN_PATH"
            
            # Fix compileSdkVersion
            sed -i.bak 's/compileSdkVersion [0-9]\+/compileSdkVersion 34/g' "$PLUGIN_PATH"
            
            # Add defaultConfig if missing
            if ! grep -q "defaultConfig" "$PLUGIN_PATH"; then
              cat >> "$PLUGIN_PATH" << 'EOF'

    defaultConfig {
        minSdkVersion 23
        targetSdkVersion 34
    }
EOF
            fi
            
            echo "Plugin patched successfully!"
          else
            echo "⚠️ sqflite_sqlcipher plugin not found"
          fi
      
      - name: Make gradlew executable
        script: chmod +x android/gradlew
      
      - name: Build Android Debug APK
        script: |
          flutter build apk --debug
    
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk