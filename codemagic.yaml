# Codemagic CI/CD Configuration for Cover App
# Android Debug Build Pipeline

workflows:
  debug-workflow:
    name: Cover Android Debug Build
    environment:
      flutter: 3.19.6
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      
      - name: Patch sqflite_sqlcipher plugin
        script: |
          # Find the actual installed version
          PLUGIN_DIR=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 1 -name "sqflite_sqlcipher-*" | head -1)
          
          if [ -d "$PLUGIN_DIR" ]; then
            PLUGIN_PATH="$PLUGIN_DIR/android/build.gradle"
            echo "Found plugin at: $PLUGIN_PATH"
            
            # Fix line 25 - compileSdkVersion
            sed -i.bak '25s/.*/    compileSdkVersion 36/' "$PLUGIN_PATH"
            
            # Add defaultConfig if missing
            if ! grep -q "defaultConfig" "$PLUGIN_PATH"; then
              echo "" >> "$PLUGIN_PATH"
              echo "    defaultConfig {" >> "$PLUGIN_PATH"
              echo "        minSdkVersion 23" >> "$PLUGIN_PATH"
              echo "        targetSdkVersion 36" >> "$PLUGIN_PATH"
              echo "    }" >> "$PLUGIN_PATH"
            fi
            
            echo "Plugin patched successfully!"
            cat "$PLUGIN_PATH"
          else
            echo "Plugin not found - checking all pub-cache..."
            find "$HOME/.pub-cache/hosted/pub.dev" -name "sqflite_sqlcipher*" -type d
          fi
      
      - name: Make gradlew executable
        script: |
          chmod +x android/gradlew 2>/dev/null || true
      
      - name: Generate code
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Build Android Debug APK
        script: |
          flutter build apk --debug
    
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk