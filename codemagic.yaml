# Codemagic CI/CD Configuration for Cover App
# Android Debug Build Pipeline

workflows:
  debug-workflow:
    name: Cover Android Debug Build
    environment:
      flutter: 3.19.6
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      # Step 1: Install Flutter dependencies
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      
      # Step 2: Generate Gradle Wrapper
      - name: Setup Gradle
        script: |
          cd android
          
          # Create gradle wrapper directory
          mkdir -p gradle/wrapper
          
          # Download gradle-wrapper.jar from official source
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradle/wrapper/gradle-wrapper.jar
          
          # Create gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-all.zip
          EOF
          
          # Create gradlew script
          cat > gradlew << 'EOF'
          #!/bin/sh
          exec "`dirname "$0"`/gradle/wrapper/gradle" "$@"
          EOF
          
          chmod +x gradlew
          
          cd ..
      
      # Step 3: Generate code
      - name: Generate code
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs
      
      # Step 4: Build Android Debug APK
      - name: Build Android Debug APK
        script: |
          flutter build apk --debug
    
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk