# Codemagic CI/CD Configuration for Cover App
# Android Debug Build Pipeline

workflows:
  debug-workflow:
    name: Cover Android Debug Build
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      # Step 0: Set Java 17
      - name: Set Java 17
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || echo "/Library/Java/JavaVirtualMachines/jdk-17.0.9.jdk/Contents/Home")
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
      
      # Step 1: Install Flutter dependencies
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      
      # Step 2: Setup Gradle
      - name: Setup Gradle
        script: |
          mkdir -p android/gradle/wrapper
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v7.6.3/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew
      
      # Step 3: Generate code
      - name: Generate code
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs
      
      # Step 4: Analyze code
      - name: Analyze code
        script: |
          flutter analyze --no-fatal-infos || true
      
      # Step 5: Build Android Debug APK
      - name: Build Android Debug APK
        script: |
          flutter build apk --debug
    
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk