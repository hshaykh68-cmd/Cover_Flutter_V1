name: cover
description: A privacy vault app that disguises itself as a calculator with on-device encryption, decoy vaults, and intruder defense.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.6
  go_router: ^13.0.0
  auto_size_text: ^3.0.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.0+1
  sqflite_sqlcipher: ^3.0.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # Cryptography & Security
  encrypt: ^5.0.3
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3

  # Media & Files
  photo_manager: ^3.0.0
  file_picker: ^6.1.1
  camera: ^0.10.5+5
  image_picker: ^1.0.5
  image: ^4.1.3
  video_player: ^2.8.1
  open_filex: ^4.3.2
  share_plus: ^7.2.1
  flutter_pdfview: ^1.3.2
  audioplayers: ^5.2.1
  url_launcher: ^6.2.1

  # Location
  geolocator: ^10.1.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_remote_config: ^4.3.8
  firebase_analytics: ^10.7.4
  firebase_crashlytics: ^3.4.8
  firebase_performance: ^0.9.3+8
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0

  # Monetization
  in_app_purchase: ^3.1.10
  in_app_purchase_android: ^0.3.0
  in_app_purchase_storekit: ^0.3.0+4
  google_mobile_ads: ^4.0.0

  # Permissions
  local_auth: ^2.1.8
  permission_handler: ^11.1.0

  # Utilities
  uuid: ^4.2.1
  intl: ^0.18.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  package_info_plus: ^5.0.1
  http: ^1.1.0
  shared_preferences: ^2.2.2

  # Sensors
  sensors_plus: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  drift_dev: ^2.14.1

  # Linting
  flutter_lints: ^3.0.1

  # Testing
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
